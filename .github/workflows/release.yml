name: Release Packages

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (for example 0.2.0 or v0.2.0)'
        required: true
      prerelease:
        description: 'Mark the GitHub release as a prerelease'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Derive release version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            RAW_VERSION='${{ inputs.version }}'
            PRERELEASE='${{ inputs.prerelease }}'
          else
            RAW_VERSION='${GITHUB_REF_NAME}'
            PRERELEASE='false'
          fi

          VERSION="${RAW_VERSION#v}"
          TAG="v${VERSION}"

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "prerelease=${PRERELEASE}" >> "$GITHUB_OUTPUT"
          echo "artifact_name=tailscale-tray-${VERSION}-release-artifacts" >> "$GITHUB_OUTPUT"

      - name: Create and push tag for manual release
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          set -euo pipefail
          TAG='${{ steps.version.outputs.tag }}'
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists locally"
          else
            git tag "$TAG"
          fi

          if git ls-remote --tags origin "refs/tags/$TAG" | grep -q "$TAG"; then
            echo "Tag $TAG already exists on origin"
          else
            git push origin "refs/tags/$TAG"
          fi

      - name: Build RPM artifact
        run: make build-rpm-container VERSION=${{ steps.version.outputs.version }}

      - name: Build AUR artifacts
        run: make build-aur-artifact VERSION=${{ steps.version.outputs.version }}

      - name: Generate checksums
        working-directory: artifacts
        run: sha256sum *.rpm *.zip > SHA256SUMS.txt

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.version.outputs.artifact_name }}
          path: |
            artifacts/*.rpm
            artifacts/*-arch-release.zip
            artifacts/SHA256SUMS.txt

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          prerelease: ${{ steps.version.outputs.prerelease == 'true' }}
          generate_release_notes: true
          files: |
            artifacts/*.rpm
            artifacts/*-arch-release.zip
            artifacts/SHA256SUMS.txt
